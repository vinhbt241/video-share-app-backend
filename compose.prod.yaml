services:
  web:
    image: video-share-app
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    ports:
      - "3000:3000"
    restart: always

  worker:
    image: video-share-app
    command: bundle exec sidekiq
    entrypoint: []
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    restart: always